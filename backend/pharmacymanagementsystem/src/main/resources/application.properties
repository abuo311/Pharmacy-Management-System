spring.application.name=pharmacymanagementsystem

# Server Port
server.port=8080

# --- Database Configuration ---
spring.datasource.url=jdbc:mysql://db:3306/pharmacy_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- JWT CONFIGURATION ---
# 🔥 FIXED: Use proper HS256-compatible secret (NOT HEX STRING)
minamo.app.jwtSecret=pharmacy_super_secret_key_2026_secure_1234567890
minamo.app.jwtExpirationMs=86400000

# --- UPLOAD LIMITS ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- LOGGING ---
logging.level.com.pharmacy=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Prevents errors when serializing empty lazy-loaded objects
spring.jackson.serialization.fail-on-empty-beans=false